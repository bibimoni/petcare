name: Deploy Backend to Render

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - develop
      - main
      - bao
      - thinh

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Trigger Render API Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"