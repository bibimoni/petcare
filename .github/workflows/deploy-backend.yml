name: Deploy Backend to Render

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'petcareserver/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render API Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"