name: CI

on:
  pull_request:
    branches: ['develop', 'main', 'bao', 'thinh']
  push:
    branches: ['develop', 'main']

jobs:
  build:
    name: Build & E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./petcareserver
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./petcareserver/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Run permission tests
        run: npx jest --config ./test/jest-e2e.json test/test-permissions.e2e-spec.ts --forceExit

  endpoint-tests:
    name: Endpoint Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./petcareserver
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: petcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./petcareserver/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server in background
        env:
          POSTGRES_URI: postgresql://postgres:password@localhost:5432/petcare_test
          DB_TYPE: postgres
          JWT_SECRET: ci_test_jwt_secret
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_PUBLIC_KEY: pk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_test_fake
          FRONTEND_URL: http://localhost:3000
          MAIL_HOST: smtp.ethereal.email
          MAIL_PORT: 587
          MAIL_USER: test@test.com
          MAIL_PASS: test
          MAIL_FROM: test@test.com
        run: node dist/main.js &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 3
          done

      - name: Seed test data
        env:
          POSTGRES_URI: postgresql://postgres:password@localhost:5432/petcare_test
          DB_TYPE: postgres
        run: npx ts-node -r tsconfig-paths/register scripts/seed-analytics.ts

      - name: Run endpoint integration tests
        run: bash scripts/test-endpoints.sh


  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')

    steps:
      - name: Trigger Render API Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deployment Status
        run: |
          echo "Deployment triggered successfully!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Check your Render dashboard for deployment progress."
