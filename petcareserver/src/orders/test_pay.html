<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stripe Payment</title>
    <script src="https://js.stripe.com/v3/"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 360px;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      #card-element {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #635bff;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:disabled {
        background: #aaa;
      }

      .message {
        text-align: center;
        margin-top: 15px;
      }

      .success {
        color: green;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>💳 Thanh toán</h2>

      <div id="card-element"></div>

      <button id="pay">Thanh toán</button>

      <div id="message" class="message"></div>
    </div>

    <script>
      const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY'); // key
      const elements = stripe.elements();

      const card = elements.create('card', {
        hidePostalCode: true,
      });

      card.mount('#card-element');

      const btn = document.getElementById('pay');
      const message = document.getElementById('message');

      btn.onclick = async () => {
        btn.disabled = true;
        btn.innerText = 'Đang xử lý...';
        message.innerHTML = '';

        try {
          const orderId = 1; // TODO: dynamic

          const res = await fetch(
            'http://localhost:8080/v1/orders/payment/intent',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer <JWT_TOKEN>',
              },
              body: JSON.stringify({ order_id: orderId }),
            },
          );

          if (!res.ok) throw new Error('API error');

          const { client_secret } = await res.json();

          const result = await stripe.confirmCardPayment(client_secret, {
            payment_method: { card },
          });

          if (result.error) {
            message.innerHTML = `<div class="error">${result.error.message}</div>`;
            btn.disabled = false;
            btn.innerText = 'Thanh toán';
          } else if (result.paymentIntent.status === 'succeeded') {
            message.innerHTML = `<div class="success">✅ Thành công!</div>`;

            setTimeout(() => {
              window.location.href = `/success?order_id=${orderId}`;
            }, 1500);
          } else if (result.paymentIntent.status === 'processing') {
            message.innerHTML = '⏳ Đang xử lý...';
          }
        } catch (err) {
          message.innerHTML = `<div class="error">Server error</div>`;
          btn.disabled = false;
          btn.innerText = 'Thanh toán';
        }
      };
    </script>
  </body>
</html>
